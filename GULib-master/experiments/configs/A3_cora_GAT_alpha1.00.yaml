# A3 alpha sweep — cora/GAT, hybrid_alpha=1.00 (single point of the sweep).
#
# See A3_cora_GCN_alpha0.25.yaml for the full pattern explanation.
# Default 0.50 reuses main matrix's hybrid cell automatically (do not create
# A3_*alpha0.50.yaml — would collide with the main matrix output dir).
#
# Output paths:
#   results/runs/cora_GAT_r0.05/{method}_hybrid_alpha1.00/seed{N}/{4 files}

name: A3_cora_GAT_alpha1.00
dataset: cora
base_model: GAT
ratio: 0.05

# Top-level hybrid_alpha: run.py auto-injects --hybrid_alpha to demo_attack +
# eval_collateral, AND uses it in cell_dir to route outputs per alpha.
hybrid_alpha: 1.00

methods:
  # Aligned with phase_b_cora_gat.yaml — same 5 GU families.
  - GIF
  - GNNDelete
  - MEGU
  - IDEA
  - GraphEraser

strategies:
  - hybrid    # alpha sweep is hybrid-only

seeds: [42, 212, 722, 1337, 2024]

defaults:
  save_predictions: true
  run_collateral: true
  no_cache: false
  num_epochs: 100
  batch_size: 64
  cuda: 0
